---
- name: Clean up old NX-OS and EPLD images
  hosts: "{{ survey_hosts }}"
  serial: 2   # Ensures two switches at a time
  gather_facts: no
  connection: network_cli

  tasks:
    - name: Get current NX-OS version
      nxos_facts:
      register: nxos_info

#    - name: Debug NX-OS facts
#      debug:
#        var: nxos_info

    - name: Show bootflash contents
      nxos_command:
        commands:
          - "dir bootflash:"
      register: bootflash_output

    - name: Extract NX-OS and EPLD filenames only
      set_fact:
        nxos_files: "{{ bootflash_output.stdout[0].split('\n') | map('regex_search', '(nxos(?:[-.]?.*)?\\.bin)') | select('string') | list }}"
        epld_files: "{{ bootflash_output.stdout[0].split('\n') | map('regex_search', '(n9000-epld.*\\.img)') | select('string') | list }}"

    - name: Build NX-OS version tuples
      set_fact:
        nxos_version_tuples: >-
          {{
            nxos_version_tuples | default([]) +
            [
              {
                'file': item,
                'version_parts': (
                  (
                    item | regex_search('([0-9]+(?:\.[0-9]+){2})')
                    if (item | regex_search('([0-9]+(?:\.[0-9]+){2})') is not none)
                    else '0.0.0'
                  )
                  | split('.')
                  | map('int')
                  | list
                )
              }
            ]
          }}
      loop: "{{ nxos_files }}"
  
    - name: Build EPLD version tuples
      set_fact:
        epld_version_tuples: >-
          {{
            epld_version_tuples | default([]) +
            [
              {
                'file': item,
                'version_parts': (
                  (
                    item | regex_search('([0-9]+(?:\.[0-9]+){2})')
                    if (item | regex_search('([0-9]+(?:\.[0-9]+){2})') is not none)
                    else '0.0.0'
                  )
                  | split('.')
                  | map('int')
                  | list
                )
              }
            ]
          }}
      loop: "{{ epld_files }}"

    - name: Sort NX-OS versions
      set_fact:
        nxos_sorted: "{{ nxos_version_tuples | sort(attribute='version_parts') }}"

    - name: Sort EPLD versions
      set_fact:
        epld_sorted: "{{ epld_version_tuples | sort(attribute='version_parts') }}"

    - name: Normalize current NX-OS version
      set_fact:
        current_version: >-
          {{
            (
              nxos_info.ansible_facts.ansible_net_version
              | regex_search('([0-9]+\.[0-9]+\([0-9]+[a-zA-Z]*\))')
              | regex_replace('[()]', '.')
            )
            | regex_search('([0-9]+\.[0-9]+\.[0-9]+)')
            | default('0.0.0')
          }}

  # Always keep current version -> Keep one older version if available
    - name: Determine NX-OS files to keep
      set_fact:
        keep_nxos: >-
          {{
            (
              (
                nxos_sorted
                | selectattr('file', 'search', current_version)
                | map(attribute='file')
                | list
              )
              +
              (
                (
                  nxos_sorted
                  | selectattr('version_parts', 'lt', current_version.split('.') | map('int') | list)
                  | map(attribute='file')
                  | list
                )[-1:]
                if keep_only_current | lower != 'yes'
                else []
              )
            )  | unique
          }}

    - name: Determine EPLD file to keep
      set_fact:
        keep_epld: "{{ [epld_sorted[-1].file] if epld_sorted | length > 0 else [] }}"

    - name: Determine files to delete
      set_fact:
        delete_files: "{{ (nxos_files + epld_files) | difference(keep_nxos + keep_epld) | list }}"

    - name: Type of delete_files
      debug:
        msg: "{{ delete_files | type_debug }}"

    - name: Show each element's type
      debug:
        msg: "{{ item | type_debug }}"
      loop: "{{ delete_files }}"

    - name: Delete old images without confirmation
      nxos_command:
        commands: "{{ delete_files
                      | map('string')
                      | map('regex_replace', '^(.*)$', 'delete bootflash:\\1 no-prompt')
                      | list }}"
      register: delete_cmds    # <— capture what was executed
      when: 
        - delete_files | length > 0
        - dry_run | lower == 'no'

    # Build per-host summary entry for later aggregation
    - name: Build per-host summary entry
      set_fact:
        cleanup_summary_entry:
          Device: "{{ inventory_hostname }}"
          Kept files: "{{ keep_nxos + keep_epld }}"
          Delete candidates: "{{ delete_files }}"
          Executed commands: "{{ delete_cmds.commands | default([]) }}"

# -------------------------
# End-of-job consolidated summary
# -------------------------

  post_tasks:

    - name: Show consolidated summary (ordered)
      debug:
        msg: |
          === Cleanup Summary ===
          {% for entry in groups['all'] | map('extract', hostvars, 'cleanup_summary_entry') | select('defined') | list %}
          Device: {{ entry.Device }}
            Kept files: {{ entry['Kept files'] | join(', ') if entry['Kept files'] else 'none' }}
            Delete candidates: {{ entry['Delete candidates'] | join(', ') if entry['Delete candidates'] else 'none' }}
            Executed commands: {{ entry['Executed commands'] | join(', ') if entry['Executed commands'] else '(none)' }}
          {% endfor %}
      run_once: true
      delegate_to: localhost
