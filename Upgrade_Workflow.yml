
# Expects: "pair" from include_tasks loop (each item contains key, members, primary, secondary, roles)
# Uses play vars: update_epld, nxos_image, epld_image, issu, wait_timeout_sec, settle_seconds, halt_on_failure, report_dir

- name: Derive | hosts for this pair
  set_fact:
    h0: "{{ pair.members[0] }}"
    h1: "{{ pair.members[1] }}"
    secondary_host: "{{ pair.secondary }}"
    primary_host:   "{{ pair.primary }}"

- name: Assert | roles present for {{ pair.key }}
  assert:
    that:
      - secondary_host | length > 0
      - primary_host   | length > 0
    fail_msg: >-
      Pair {{ pair.key }} missing roles. roles={{ pair.roles | default({}) }}

################################################################################
# PRE: capture + parse full interface status for h0 and h1 (normalize Status/Vlan)
################################################################################

- name: PRE | Capture 'show interface status' (h0)
  delegate_to: "{{ h0 }}"
  cisco.nxos.nxos_command:
    commands: ["show interface status"]
  register: pre_ifstatus_h0

- name: PRE | Parse into dict (h0) — normalize Status/Vlan, ignore Desc
  delegate_to: "{{ h0 }}"
  delegate_facts: true
  vars:
    pre_if_raw_h0: >-
      {{
        pre_ifstatus_h0.stdout[0]
        | regex_replace('(?m)^-+.*\n', '')                               
        | regex_replace('(?m)^\s*Port\s+Name\s+Status.*\n', '')        
        | regex_replace('\r', '')                                        
        | regex_replace('\n\s{2,}', ' ')                                 
      }}
    pre_lines_h0: "{{ pre_if_raw_h0.split('\n') }}"
    status_vocab: [ 'connected','notconnect','disabled','errdisabled','inactive',
                    'monitoring','link-flap','xcvrabsent','sfpabsent' ]
  set_fact:
    pre_interfaces_map: >-
      {%- set m = {} -%}
      {%- for ln in pre_lines_h0 -%}
        {%- if ln | regex_search('^(Eth|mgmt|Po|Gi|Te|Hu|Lo)') -%}
          {%- set toks = ln | regex_findall('\S+') -%}
          {%- if (toks|length) >= 4 -%}
            {%- set port = toks[0] -%}
            
            {%- set cand = [] -%}
            {%- for i in range(1, toks|length) -%}
              {%- set tk = (toks[i] | lower) -%}
              {%- if (tk in status_vocab) or (tk | regex_search('^xcvr|^sfp')) -%}
                {%- set _ = cand.append(i) -%}
              {%- endif -%}
            {%- endfor -%}
            {%- set st_idx = (cand[0] if (cand|length) > 0 else -1) -%}

            {%- if st_idx != -1 -%}
              {%- set status_raw = toks[st_idx] | lower -%}
              {%- set vlan_raw   = (toks[st_idx+1] | default('')) | lower -%}
              {%- set duplex     = (toks[st_idx+2] | default('')) | lower -%}
              {%- set speed      = (toks[st_idx+3] | default('')) | lower -%}
              {%- set type_val   = (toks[st_idx+4:] | join(' ') ) -%}
              
              {%- set status_norm = (
                    (status_raw ~ ' ' ~ vlan_raw)
                    | regex_findall('(?i)^(connected)\s+(routed|trunk|\d+)$')
                    | first
                    | default([])
                ) -%}
              {%- if status_norm and (status_norm|length) == 2 -%}
                {%- set status = status_norm[0] | lower -%}
                {%- set vlan   = status_norm[1] | lower -%}
              {%- else -%}
                {%- set status = status_raw -%}
                {%- set vlan   = vlan_raw -%}
              {%- endif -%}
             
              {%- if status | regex_search('(?i)^xcvr') -%}{%- set status = 'xcvrabsent' -%}{%- endif -%}
              {%- if status | regex_search('(?i)^sfp')  -%}{%- set status = 'sfpabsent'  -%}{%- endif -%}

              {%- set _ = m.update({
                    port: {
                      'port': port, 'status': status,
                      'vlan': vlan, 'duplex': duplex, 'speed': speed, 'type': type_val
                    }
                  }) -%}
            {%- endif -%}
          {%- endif -%}
        {%- endif -%}
      {%- endfor -%}
      {{ m }}

- name: PRE | Save snapshot (h0)
  when: save_snapshot_files | default(false) | bool
  delegate_to: localhost
  ansible.builtin.copy:
    dest: "{{ report_dir }}/{{ h0 }}_pre_interfaces.json"
    content: "{{ hostvars[h0].pre_interfaces_map | to_nice_json }}"

- name: PRE | Capture 'show interface status' (h1)
  delegate_to: "{{ h1 }}"
  cisco.nxos.nxos_command:
    commands: ["show interface status"]
  register: pre_ifstatus_h1

