    status_vocab: [ 'connected','notconnect','disabled','errdisabled','inactive',
                    'monitoring','link-flap','xcvrabsent','sfpabsent' ]
  set_fact:
    pre_interfaces_map: >-
      {%- set m = {} -%}
      {%- for ln in pre_lines_h1 -%}
        {%- if ln | regex_search('^(Eth|mgmt|Po|Gi|Te|Hu|Lo)') -%}
          {%- set toks = ln | regex_findall('\S+') -%}
          {%- if (toks|length) >= 4 -%}
            {%- set port = toks[0] -%}

            {%- set cand = [] -%}
            {%- for i in range(1, toks|length) -%}
              {%- set tk = (toks[i] | lower) -%}
              {%- if (tk in status_vocab) or (tk | regex_search('^xcvr|^sfp')) -%}
                {%- set _ = cand.append(i) -%}
              {%- endif -%}
            {%- endfor -%}
            {%- set st_idx = (cand[0] if (cand|length) > 0 else -1) -%}

            {%- if st_idx != -1 -%}
              {%- set status_raw = toks[st_idx] | lower -%}
              {%- set vlan_raw   = (toks[st_idx+1] | default('')) | lower -%}
              {%- set duplex     = (toks[st_idx+2] | default('')) | lower -%}
              {%- set speed      = (toks[st_idx+3] | default('')) | lower -%}
              {%- set type_val   = (toks[st_idx+4:] | join(' ') ) -%}

