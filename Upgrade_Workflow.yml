    dest: "{{ report_dir }}/{{ h1 }}_pre_interfaces.json"
    content: "{{ hostvars[h1].pre_interfaces_map | to_nice_json }}"


#################################
# Upgrade primary → then secondary
#################################

- name: Upgrade | primary first (EPLD)
  when: update_epld
  delegate_to: "{{ primary_host }}"
  cisco.nxos.nxos_command:
    commands:
      - "install all nxos {{ nxos_image }} epld {{ epld_image }}"

- name: Upgrade | primary first (standard)
  when: not update_epld
  delegate_to: "{{ primary_host }}"
  cisco.nxos.nxos_install_os:
    system_image_file: "{{ nxos_image }}"
    issu: "{{ issu }}"

- name: Wait for SSH (primary) to go DOWN (device rebooting)
  delegate_to: localhost
  vars:
    target_ip: "{{ hostvars[primary_host].ansible_host | default(primary_host) }}"
  ansible.builtin.wait_for:
    host: "{{ target_ip }}"
    port: 22
    timeout: 300
    state: stopped

- name: Wait for SSH (primary) to return (device back online)
  delegate_to: localhost
  vars:
    target_ip: "{{ hostvars[primary_host].ansible_host | default(primary_host) }}"
  ansible.builtin.wait_for:
    host: "{{ target_ip }}"
    port: 22
    timeout: "{{ wait_timeout_sec }}"
    state: started

- name: Settle | pause after primary
  ansible.builtin.pause:
    seconds: "{{ settle_seconds }}"

# The secondary connection may have gone idle during the primary reboot cycle.
# Reset it before polling to avoid "Failed to write to ssh channel" errors.
- name: Reset | refresh idle SSH connection to secondary before health check
  delegate_to: "{{ secondary_host }}"
  ansible.builtin.meta: reset_connection

# Query vPC health from the secondary (stable, never rebooted) — it can see
# the peer link recover and avoids any stale-connection issues on the primary.
- name: Health wait | primary vPC convergence (checked from secondary)
  delegate_to: "{{ secondary_host }}"
  cisco.nxos.nxos_command:
    commands: ["show vpc"]
  register: post_primary_vpc
  failed_when: false
  retries: 30
  delay: 20
  until:
    - (post_primary_vpc.stdout | default([]) | length) > 0
    - (post_primary_vpc.stdout[0] | default('') | regex_search('(?im)^\s*vPC\s+status\s*:\s*up\s*$')) is not none
    - (post_primary_vpc.stdout[0] | default('') | regex_search('(?im)^\s*Peer\s+status\s*:\s*peer adjacency formed(\s+ok)?\s*$')) is not none

- name: Assert health | primary vPC is up and peer adjacency formed
  assert:
    that:
      - (post_primary_vpc.stdout | default([]) | length) > 0
      - (post_primary_vpc.stdout[0] | default('') | regex_search('(?im)^\s*vPC\s+status\s*:\s*up\s*$')) is not none
      - (post_primary_vpc.stdout[0] | default('') | regex_search('(?im)^\s*Peer\s+status\s*:\s*peer adjacency formed(\s+ok)?\s*$')) is not none
    fail_msg: >-
      Primary {{ primary_host }} health check failed after convergence wait.
      Output:
      {{ post_primary_vpc.stdout[0] | default('show vpc returned no output') }}

- name: Upgrade | secondary (EPLD)
  when: update_epld
  delegate_to: "{{ secondary_host }}"
  cisco.nxos.nxos_command:
    commands:
      - "install all nxos {{ nxos_image }} epld {{ epld_image }}"

- name: Upgrade | secondary (standard)
  when: not update_epld
  delegate_to: "{{ secondary_host }}"
  cisco.nxos.nxos_install_os:
    system_image_file: "{{ nxos_image }}"
    issu: "{{ issu }}"

- name: Wait for SSH (secondary) to go DOWN (device rebooting)
  delegate_to: localhost
  vars:
    target_ip: "{{ hostvars[secondary_host].ansible_host | default(secondary_host) }}"
  ansible.builtin.wait_for:
    host: "{{ target_ip }}"
    port: 22
    timeout: 300
    state: stopped

- name: Wait for SSH (secondary) to return (device back online)
  delegate_to: localhost
  vars:
    target_ip: "{{ hostvars[secondary_host].ansible_host | default(secondary_host) }}"
  ansible.builtin.wait_for:
    host: "{{ target_ip }}"
    port: 22
    timeout: "{{ wait_timeout_sec }}"
    state: started

- name: Settle | pause after secondary
  ansible.builtin.pause:
    seconds: "{{ settle_seconds }}"

# The primary connection may have gone idle during the secondary reboot cycle.
# Reset it before polling to avoid "Failed to write to ssh channel" errors.
- name: Reset | refresh idle SSH connection to primary before health check
  delegate_to: "{{ primary_host }}"
  ansible.builtin.meta: reset_connection

# Query vPC health from the primary (already recovered, stable connection) —
# avoids stale-connection issues on the just-rebooted secondary.
- name: Health wait | secondary vPC convergence (checked from primary)
  delegate_to: "{{ primary_host }}"
  cisco.nxos.nxos_command:
    commands: ["show vpc"]
  register: post_secondary_vpc
  failed_when: false
  retries: 30
  delay: 20
  until:
    - (post_secondary_vpc.stdout | default([]) | length) > 0
    - (post_secondary_vpc.stdout[0] | default('') | regex_search('(?im)^\s*vPC\s+status\s*:\s*up\s*$')) is not none
    - (post_secondary_vpc.stdout[0] | default('') | regex_search('(?im)^\s*Peer\s+status\s*:\s*peer adjacency formed(\s+ok)?\s*$')) is not none

- name: Assert health | secondary vPC is up and peer adjacency formed
  assert:
    that:
      - (post_secondary_vpc.stdout | default([]) | length) > 0
      - (post_secondary_vpc.stdout[0] | default('') | regex_search('(?im)^\s*vPC\s+status\s*:\s*up\s*$')) is not none
      - (post_secondary_vpc.stdout[0] | default('') | regex_search('(?im)^\s*Peer\s+status\s*:\s*peer adjacency formed(\s+ok)?\s*$')) is not none
    fail_msg: >-
      Secondary {{ secondary_host }} health check failed after convergence wait.
      Output:
      {{ post_secondary_vpc.stdout[0] | default('show vpc returned no output') }}

