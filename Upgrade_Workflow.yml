################################
# DIFF (connected-only) & ASSERT
################################

- name: DIFF | Compute interface diffs (h0) — connected-only, ignore descriptions
  delegate_to: "{{ h0 }}"
  delegate_facts: true
  set_fact:
    pre_connected_map: >-
      {{
        (pre_interfaces_map | default({}))
        | dict2items
        | selectattr('value.status', 'equalto', 'connected')
        | items2dict(key_name='key', value_name='value')
      }}
    post_connected_map: >-
      {{
        (post_interfaces_map | default({}))
        | dict2items
        | selectattr('value.status', 'equalto', 'connected')
        | items2dict(key_name='key', value_name='value')
      }}
    pre_connected_list: "{{ pre_connected_map.keys() | list }}"
    post_connected_list: "{{ post_connected_map.keys() | list }}"
    if_missing_after: "{{ pre_connected_list | difference(post_connected_list) }}"
    if_new_after: "{{ post_connected_list | difference(pre_connected_list) }}"
    if_common: "{{ pre_connected_list | intersect(post_connected_list) }}"
    if_changed: >-
      {%- set lst = [] -%}
      {%- for ifn in if_common -%}
        {%- set pre = pre_connected_map.get(ifn, {}) -%}
        {%- set post = post_connected_map.get(ifn, {}) -%}
        {%- set delta = {} -%}
        {%- for k in ['vlan','speed','type'] -%}
          {%- if pre.get(k) != post.get(k) -%}
            {%- set _ = delta.update({ k: {'before': pre.get(k,'n/a'), 'after': post.get(k,'n/a')} }) -%}
          {%- endif -%}
        {%- endfor -%}
        {%- if delta | length > 0 -%}
          {%- set _ = lst.append({'interface': ifn, 'changes': delta}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ lst }}
    interface_diff_summary: |-
      Host: {{ h0 }}
      Missing (were connected pre, not connected post): {{ if_missing_after | join(', ') if if_missing_after|length>0 else 'none' }}
      New (not connected pre, connected post): {{ if_new_after | join(', ') if if_new_after|length>0 else 'none' }}
      Changed attributes among still-connected (vlan/speed/type):
      {% if if_changed|length == 0 %}
        none
      {% else %}
      {% for d in if_changed %}
        - {{ d.interface }}:
          {% for k,ch in d.changes.items() %}
            {{ k }}: {{ ch.before }} -> {{ ch.after }}
          {% endfor %}
      {% endfor %}
      {% endif %}

- name: DIFF | Compute interface diffs (h1) — connected-only, ignore descriptions
  delegate_to: "{{ h1 }}"
  delegate_facts: true
  set_fact:
    pre_connected_map: >-
      {{
        (pre_interfaces_map | default({}))
        | dict2items
        | selectattr('value.status', 'equalto', 'connected')
        | items2dict(key_name='key', value_name='value')
      }}
    post_connected_map: >-
      {{
        (post_interfaces_map | default({}))
        | dict2items
        | selectattr('value.status', 'equalto', 'connected')
        | items2dict(key_name='key', value_name='value')
      }}
    pre_connected_list: "{{ pre_connected_map.keys() | list }}"
    post_connected_list: "{{ post_connected_map.keys() | list }}"
    if_missing_after: "{{ pre_connected_list | difference(post_connected_list) }}"
    if_new_after: "{{ post_connected_list | difference(pre_connected_list) }}"
    if_common: "{{ pre_connected_list | intersect(post_connected_list) }}"
    if_changed: >-
      {%- set lst = [] -%}
      {%- for ifn in if_common -%}
        {%- set pre = pre_connected_map.get(ifn, {}) -%}
        {%- set post = post_connected_map.get(ifn, {}) -%}
        {%- set delta = {} -%}
        {%- for k in ['vlan','speed','type'] -%}
          {%- if pre.get(k) != post.get(k) -%}
            {%- set _ = delta.update({ k: {'before': pre.get(k,'n/a'), 'after': post.get(k,'n/a')} }) -%}
          {%- endif -%}
        {%- endfor -%}
        {%- if delta | length > 0 -%}
          {%- set _ = lst.append({'interface': ifn, 'changes': delta}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ lst }}
    interface_diff_summary: |-
      Host: {{ h1 }}
      Missing (were connected pre, not connected post): {{ if_missing_after | join(', ') if if_missing_after|length>0 else 'none' }}
      New (not connected pre, connected post): {{ if_new_after | join(', ') if if_new_after|length>0 else 'none' }}
      Changed attributes among still-connected (vlan/speed/type):
      {% if if_changed|length == 0 %}
        none
      {% else %}
      {% for d in if_changed %}
        - {{ d.interface }}:
          {% for k,ch in d.changes.items() %}
            {{ k }}: {{ ch.before }} -> {{ ch.after }}
          {% endfor %}
      {% endfor %}
      {% endif %}

- name: ASSERT | No interface regressions (both peers)
  block:
    - name: ASSERT | {{ h0 }} — pre-connected are back and unchanged
      delegate_to: "{{ h0 }}"
      assert:
        that:
          - (hostvars[h0].if_missing_after | default([])) | length == 0
          - (hostvars[h0].if_changed      | default([])) | length == 0
        fail_msg: >-
          Interface regressions detected on {{ h0 }}:
          {{ hostvars[h0].interface_diff_summary | default('no summary') }}

    - name: ASSERT | {{ h1 }} — pre-connected are back and unchanged
      delegate_to: "{{ h1 }}"
      assert:
        that:
          - (hostvars[h1].if_missing_after | default([])) | length == 0
          - (hostvars[h1].if_changed      | default([])) | length == 0
        fail_msg: >-
          Interface regressions detected on {{ h1 }}:
          {{ hostvars[h1].interface_diff_summary | default('no summary') }}
  rescue:
    - name: Publish | failing pair diff artifacts
      run_once: true
      delegate_to: localhost
      ansible.builtin.set_stats:
        data:
          "{{ pair.key }}_h0_diff": "{{ hostvars[h0].interface_diff_summary | default('n/a') }}"
          "{{ pair.key }}_h1_diff": "{{ hostvars[h1].interface_diff_summary | default('n/a') }}"
    - name: Abort | stop further pairs (halt_on_failure)
      when: halt_on_failure | bool
      fail:
        msg: "Halting after pair {{ pair.key }} interface regression (halt_on_failure=true)."

- name: Publish | pair diff artifacts (success path)
  run_once: true
  delegate_to: localhost
  ansible.builtin.set_stats:
    data:
      "{{ pair.key }}_h0_diff": "{{ hostvars[h0].interface_diff_summary | default('n/a') }}"
      "{{ pair.key }}_h1_diff": "{{ hostvars[h1].interface_diff_summary | default('n/a') }}"

- name: Mark | append processed pair
  run_once: true
  delegate_to: localhost
  set_fact:
    processed_pairs: "{{ (processed_pairs | default([])) + [pair.key] }}"
